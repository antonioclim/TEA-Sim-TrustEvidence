<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="360" viewBox="0 0 1100 360" role="img" aria-labelledby="title desc">
<title>Backend execution and verification pipeline</title>
<desc>backend-evaluation stage pipeline separating unavailable PostgreSQL and A3 services from executed Merkle local reference measurements.</desc>
<style>
  .box { fill: #ffffff; stroke: #222222; stroke-width: 2; rx: 12; ry: 12; }
  .blocked { fill: #f7f7f7; stroke: #555555; stroke-dasharray: 7 5; stroke-width: 2; rx: 12; ry: 12; }
  .txt { font-family: Arial, Helvetica, sans-serif; font-size: 18px; fill: #111111; }
  .small { font-family: Arial, Helvetica, sans-serif; font-size: 14px; fill: #222222; }
  .arrow { stroke: #222222; stroke-width: 2; marker-end: url(#arrow); }
</style>
<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#222222"/></marker></defs>
<rect class="box" x="30" y="125" width="220" height="100"/>
<text class="txt" x="55" y="165">Synthetic</text><text class="txt" x="55" y="190">TrustEvidence objects</text>
<line class="arrow" x1="250" y1="175" x2="320" y2="175"/>
<rect class="box" x="320" y="35" width="235" height="85"/>
<text class="txt" x="345" y="70">A1 PostgreSQL</text><text class="small" x="345" y="95">schema + adapter; unavailable</text>
<rect class="box" x="320" y="140" width="235" height="90"/>
<text class="txt" x="345" y="175">A2 Merkle</text><text class="small" x="345" y="200">executed locally; tested</text>
<rect class="blocked" x="320" y="250" width="235" height="85"/>
<text class="txt" x="345" y="285">A3 transparency</text><text class="small" x="345" y="310">adapter-only; not executed</text>
<line class="arrow" x1="555" y1="185" x2="625" y2="185"/>
<rect class="box" x="625" y="140" width="210" height="90"/>
<text class="txt" x="650" y="175">Receipts + proofs</text><text class="small" x="650" y="200">root, inclusion path, size</text>
<line class="arrow" x1="835" y1="185" x2="905" y2="185"/>
<rect class="box" x="905" y="115" width="165" height="140"/>
<text class="txt" x="930" y="160">Benchmark</text><text class="small" x="930" y="187">p50/p95 latency</text><text class="small" x="930" y="210">receipt/proof size</text><text class="small" x="930" y="233">tamper results</text>
</svg>
