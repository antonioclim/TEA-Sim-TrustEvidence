name: Route C C6 Apply Candidate Patch

on:
  push:
    branches:
      - revision/jcis-route-c
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply-candidate:
    name: Apply the controlled C6 candidate patch
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.head_commit.message == 'ci(route-c): apply C6 candidate patch'
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Check out the controlled Route C branch
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          ref: revision/jcis-route-c
          fetch-depth: 0

      - name: Reassemble and authenticate the staged patch
        shell: bash
        run: |
          set -euo pipefail
          cat .github/c6_patch_parts/part-*.txt > /tmp/c6.patch.xz.b64
          printf '%s  %s\n' \
            '899b889f19470443fd7e30a354eefb90dd2b116998659cf8009b779d5073a13f' \
            '/tmp/c6.patch.xz.b64' | sha256sum --check --strict -
          base64 --decode /tmp/c6.patch.xz.b64 | xz --decompress > /tmp/c6.patch
          printf '%s  %s\n' \
            'c695f53da23985f783b97b43fc92450076e4461022b2a6f0a5e51ae5a94c6699' \
            '/tmp/c6.patch' | sha256sum --check --strict -

      - name: Apply the non-workflow release-candidate tree
        shell: bash
        run: |
          set -euo pipefail
          git apply --check --whitespace=error-all /tmp/c6.patch
          git apply --whitespace=error-all /tmp/c6.patch
          # GITHUB_TOKEN cannot authorise workflow-file changes. Preserve the
          # current workflows for this intermediate bot commit; they are
          # replaced and removed through the authenticated repository connector.
          git checkout HEAD -- \
            .github/workflows/c6-source-snapshot.yml \
            .github/workflows/route-c-ci.yml
          rm -rf .github/c6_patch_parts
          python scripts/rebuild_integrity_files.py
          git diff --check

      - name: Execute intermediate governance checks
        shell: bash
        run: |
          set -euo pipefail
          python scripts/check_public_metadata.py
          python scripts/audit_public_distribution.py
          python scripts/make_reproducibility_manifest.py --check
          python scripts/repository_check.py
          python scripts/verify_sha256sums.py SHA256SUMS.txt
          python scripts/verify_file_manifest.py FILE_MANIFEST.tsv

      - name: Commit the non-workflow C6 candidate tree
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          if git diff --cached --quiet; then
            echo 'The C6 patch produced no candidate-tree change.'
            exit 1
          fi
          git commit -m 'feat(route-c): construct v2.2.0 candidate content'
          git push origin HEAD:revision/jcis-route-c
