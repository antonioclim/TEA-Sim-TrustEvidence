name: Route C C6 Final Integrity Sync

on:
  push:
    branches:
      - revision/jcis-route-c-ci
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    name: Synchronise final C6 manifests
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Check out the controlled Route C candidate
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          ref: revision/jcis-route-c
          fetch-depth: 0

      - name: Set up Python 3.13
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.13'

      - name: Rebuild and verify final integrity catalogues
        shell: bash
        run: |
          set -euo pipefail
          python scripts/rebuild_integrity_files.py
          python scripts/verify_sha256sums.py SHA256SUMS.txt
          python scripts/verify_file_manifest.py FILE_MANIFEST.tsv
          git diff --check

      - name: Commit the final C6 integrity catalogues
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add FILE_MANIFEST.tsv SHA256SUMS.txt
          if git diff --cached --quiet; then
            echo 'Final C6 integrity catalogues already match the candidate tree.'
            exit 0
          fi
          git commit -m 'chore(route-c): synchronise v2.2.0-rc.1 integrity catalogues'
          git push origin HEAD:revision/jcis-route-c

# Synchronisation cycle 2: remove the temporary C6 patch workflow before the hosted gate.
