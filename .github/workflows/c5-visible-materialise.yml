name: Route C C5 Visible Materialisation

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: route-c-c5-visible-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  materialise:
    name: Materialise and retain frozen C5 evidence
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Check out the Route C branch
        uses: actions/checkout@v4
        with:
          ref: revision/jcis-route-c
          fetch-depth: 1

      - name: Commit the direct-execution import repair before measurement
        id: repair
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('experiments/run_hie_incremental_overhead.py')
          text = path.read_text(encoding='utf-8')
          old = 'from experiments import run_hie_hero_case as hie_case\n'
          new = (
              'try:\n'
              '    from experiments import run_hie_hero_case as hie_case\n'
              'except ModuleNotFoundError:  # direct script execution places experiments/ on sys.path\n'
              '    import run_hie_hero_case as hie_case\n'
          )
          if new in text:
              pass
          elif old in text:
              path.write_text(text.replace(old, new, 1), encoding='utf-8', newline='\n')
          else:
              raise SystemExit('C5 import repair: expected source pattern not found')
          PY
          if git diff --quiet -- experiments/run_hie_incremental_overhead.py; then
            echo 'changed=false' >> "$GITHUB_OUTPUT"
            echo 'The direct-execution import repair is already committed.'
            exit 0
          fi
          python -m py_compile experiments/run_hie_incremental_overhead.py
          python scripts/rebuild_integrity_files.py
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add experiments/run_hie_incremental_overhead.py FILE_MANIFEST.tsv SHA256SUMS.txt
          git commit -m 'fix(route-c): support direct C5 runner execution'
          git push origin HEAD:revision/jcis-route-c
          echo 'changed=true' >> "$GITHUB_OUTPUT"

      - name: Determine whether materialisation is required
        id: decision
        shell: bash
        run: |
          if test "${{ steps.repair.outputs.changed }}" = 'true'; then
            echo 'run=false' >> "$GITHUB_OUTPUT"
            echo 'Software repair was committed first; the synchronised follow-up run will measure it.'
          elif test -f docs/route_c/C5_MATERIALISATION_TRIGGER.md && \
               ! test -f results_expected/cmpb_reference/c5_hie_overhead/run_summary.json; then
            echo 'run=true' >> "$GITHUB_OUTPUT"
            echo 'Frozen C5 evidence is absent; one confirmatory materialisation is required.'
          else
            echo 'run=false' >> "$GITHUB_OUTPUT"
            echo 'Frozen C5 evidence is already retained or the trigger marker is absent.'
          fi

      - name: Set up Python 3.13
        if: steps.decision.outputs.run == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install the locked environment
        if: steps.decision.outputs.run == 'true'
        run: |
          python -m pip install --disable-pip-version-check --no-input setuptools==82.0.1 wheel==0.46.3
          python -m pip install --disable-pip-version-check --no-input -r environment/requirements-lock-py313-linux.txt
          python -m pip install --disable-pip-version-check --no-input --no-build-isolation --no-deps -e .

      - name: Execute the frozen W1 confirmatory experiment with retained transcript
        if: steps.decision.outputs.run == 'true'
        shell: bash
        run: |
          set +e
          log="${RUNNER_TEMP}/c5-visible-materialisation.log"
          : > "$log"
          python experiments/run_hie_incremental_overhead.py \
            --output-dir results_expected/cmpb_reference/c5_hie_overhead \
            2>&1 | tee -a "$log"
          status=${PIPESTATUS[0]}
          if test "$status" -eq 0; then
            python experiments/run_hie_incremental_overhead.py --check 2>&1 | tee -a "$log"
            status=${PIPESTATUS[0]}
          fi
          if test "$status" -eq 0; then
            python scripts/make_reproducibility_manifest.py 2>&1 | tee -a "$log"
            status=${PIPESTATUS[0]}
          fi
          if test "$status" -eq 0; then
            python scripts/validate_result_contracts.py 2>&1 | tee -a "$log"
            status=${PIPESTATUS[0]}
          fi
          if test "$status" -eq 0; then
            python scripts/rebuild_integrity_files.py 2>&1 | tee -a "$log"
            status=${PIPESTATUS[0]}
          fi
          printf '%s\n' "$status" > "${RUNNER_TEMP}/c5-visible-exit-code.txt"
          exit 0

      - name: Upload C5 transcript and partial evidence
        if: always() && steps.decision.outputs.run == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: route-c-c5-overhead-visible-diagnostic
          path: |
            ${{ runner.temp }}/c5-visible-materialisation.log
            ${{ runner.temp }}/c5-visible-exit-code.txt
            results_expected/cmpb_reference/c5_hie_overhead
          if-no-files-found: warn
          retention-days: 30

      - name: Reject a failed confirmatory execution
        if: steps.decision.outputs.run == 'true'
        shell: bash
        run: |
          status=$(cat "${RUNNER_TEMP}/c5-visible-exit-code.txt")
          if test "$status" -ne 0; then
            echo "C5 confirmatory execution failed with status $status."
            exit "$status"
          fi

      - name: Commit retained evidence and integrity manifests
        if: steps.decision.outputs.run == 'true'
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add results_expected/cmpb_reference/c5_hie_overhead
          git add results_expected/cmpb_reference/reproducibility_manifest.csv
          git add FILE_MANIFEST.tsv SHA256SUMS.txt
          if git diff --cached --quiet; then
            echo 'The confirmatory run produced no retained C5 evidence changes.'
            exit 1
          fi
          git commit -m 'chore(route-c): materialise C5 paired overhead evidence'
          git push origin HEAD:revision/jcis-route-c
