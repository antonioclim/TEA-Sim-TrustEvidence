name: Route C CI

on:
  push:
    branches:
      - main
      - revision/jcis-route-c
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: route-c-ci-${{ github.sha }}
  cancel-in-progress: false

jobs:
  integrity-sync:
    name: One-time integrity bootstrap
    if: >-
      github.event_name == 'push' &&
      github.ref == 'refs/heads/revision/jcis-route-c' &&
      github.event.head_commit.message == 'ci(route-c): bootstrap integrity sync'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Check out the Route C branch
        uses: actions/checkout@v4
        with:
          ref: revision/jcis-route-c

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Rebuild integrity files
        run: python scripts/rebuild_integrity_files.py

      - name: Commit the regenerated integrity files
        shell: bash
        run: |
          if git diff --quiet -- FILE_MANIFEST.tsv SHA256SUMS.txt; then
            echo 'Integrity files already match the distributed tree.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add FILE_MANIFEST.tsv SHA256SUMS.txt
          git commit -m 'chore(route-c): refresh integrity manifests'
          git push origin HEAD:revision/jcis-route-c

  c3-materialise:
    name: Materialise validated C3 evidence
    if: >-
      github.event_name == 'push' &&
      github.ref == 'refs/heads/revision/jcis-route-c' &&
      github.event.head_commit.message == 'ci(route-c): materialise C3 evidence'
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    permissions:
      contents: write
    steps:
      - name: Check out the Route C branch
        uses: actions/checkout@v4
        with:
          ref: revision/jcis-route-c

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install the locked Python environment and SUSHI
        run: |
          python -m pip install --disable-pip-version-check --no-input setuptools==82.0.1 wheel==0.46.3
          python -m pip install --disable-pip-version-check --no-input -r environment/requirements-lock-py313-linux.txt
          python -m pip install --disable-pip-version-check --no-input --no-build-isolation --no-deps -e .
          npm install --global fsh-sushi@3.20.0

      - name: Build the deterministic hero case
        run: |
          python experiments/build_hie_hero_case.py --write
          python scripts/check_hie_fhir_projection.py --output standards/fhir_ig/validation/semantic_validation.json

      - name: Compile the minimal implementation guide with SUSHI
        run: |
          mkdir -p standards/fhir_ig/validation
          sushi standards/fhir_ig 2>&1 | tee standards/fhir_ig/validation/sushi.log

      - name: Download official FHIR tools
        run: |
          mkdir -p "${RUNNER_TEMP}/fhir-tools"
          curl --fail --location --retry 4 --output "${RUNNER_TEMP}/fhir-tools/publisher.jar" \
            https://github.com/FHIR/latest-ig-publisher/raw/master/org.hl7.fhir.publisher.jar
          curl --fail --location --retry 4 --output "${RUNNER_TEMP}/fhir-tools/validator_cli.jar" \
            https://github.com/hapifhir/org.hl7.fhir.core/releases/latest/download/validator_cli.jar
          sha256sum "${RUNNER_TEMP}/fhir-tools/publisher.jar" "${RUNNER_TEMP}/fhir-tools/validator_cli.jar" \
            > standards/fhir_ig/validation/tool_sha256.txt
          {
            echo "python=$(python --version 2>&1)"
            echo "java=$(java -version 2>&1 | head -n 1)"
            echo "node=$(node --version)"
            echo "sushi=$(sushi --version 2>&1 | tail -n 1)"
            echo "publisher=$(java -jar ${RUNNER_TEMP}/fhir-tools/publisher.jar -version 2>&1 | tail -n 1)"
            echo "validator=$(java -jar ${RUNNER_TEMP}/fhir-tools/validator_cli.jar -version 2>&1 | tail -n 1)"
          } > standards/fhir_ig/validation/tool_versions.txt

      - name: Run IG Publisher
        run: |
          java -jar "${RUNNER_TEMP}/fhir-tools/publisher.jar" \
            -ig standards/fhir_ig/ig.ini -tx n/a \
            2>&1 | tee standards/fhir_ig/validation/ig-publisher.log

      - name: Validate positive and negative FHIR examples
        shell: bash
        run: |
          set -u
          mkdir -p standards/fhir_ig/validation/positive standards/fhir_ig/validation/negative
          package=standards/fhir_ig/output/package.tgz
          test -f "$package"
          : > standards/fhir_ig/validation/validator_status.tsv
          validate_one() {
            local kind="$1"
            local source="$2"
            local stem
            stem="$(basename "$source" .json)"
            local output="standards/fhir_ig/validation/${kind}/${stem}.operationoutcome.json"
            set +e
            java -jar "${RUNNER_TEMP}/fhir-tools/validator_cli.jar" "$source" \
              -version 4.0.1 -ig "$package" -ig ihe.iti.balp#1.1.4 \
              -tx n/a -output "$output" -output-style json
            local status=$?
            set -e
            printf '%s\t%s\t%s\n' "$kind" "$status" "$source" >> standards/fhir_ig/validation/validator_status.tsv
          }
          set -e
          for source in standards/fhir_ig/input/resources/*.json; do
            validate_one positive "$source"
          done
          validate_one positive data_examples/hie_disclosure/source/source_clinical_bundle.json
          for source in standards/fhir_ig/negative/*.json; do
            validate_one negative "$source"
          done
          python scripts/summarise_fhir_validation.py \
            --positive-dir standards/fhir_ig/validation/positive \
            --negative-dir standards/fhir_ig/validation/negative \
            --output standards/fhir_ig/validation/validator_summary.json

      - name: Commit the validated C3 evidence
        shell: bash
        run: |
          python scripts/rebuild_integrity_files.py
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add data_examples/hie_disclosure standards/fhir_ig FILE_MANIFEST.tsv SHA256SUMS.txt
          git commit -m 'chore(route-c): materialise validated C3 evidence'
          git push origin HEAD:revision/jcis-route-c

      - name: Upload C3 evidence even when validation fails
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: route-c-c3-materialisation
          path: |
            data_examples/hie_disclosure
            standards/fhir_ig
          if-no-files-found: warn
          retention-days: 30

  fhir-validation:
    name: HIE case and official FHIR validation
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install the locked Python environment and SUSHI
        run: |
          python -m pip install --disable-pip-version-check --no-input setuptools==82.0.1 wheel==0.46.3
          python -m pip install --disable-pip-version-check --no-input -r environment/requirements-lock-py313-linux.txt
          python -m pip install --disable-pip-version-check --no-input --no-build-isolation --no-deps -e .
          npm install --global fsh-sushi@3.20.0

      - name: Build or verify the deterministic hero case
        run: |
          if test -f data_examples/hie_disclosure/case_manifest.json; then
            python experiments/build_hie_hero_case.py --check
          else
            python experiments/build_hie_hero_case.py --write
          fi
          python scripts/check_hie_fhir_projection.py --output "${RUNNER_TEMP}/semantic_validation.json"

      - name: Compile the minimal implementation guide with SUSHI
        run: sushi standards/fhir_ig 2>&1 | tee "${RUNNER_TEMP}/sushi.log"

      - name: Download official FHIR tools
        run: |
          mkdir -p "${RUNNER_TEMP}/fhir-tools"
          curl --fail --location --retry 4 --output "${RUNNER_TEMP}/fhir-tools/publisher.jar" \
            https://github.com/FHIR/latest-ig-publisher/raw/master/org.hl7.fhir.publisher.jar
          curl --fail --location --retry 4 --output "${RUNNER_TEMP}/fhir-tools/validator_cli.jar" \
            https://github.com/hapifhir/org.hl7.fhir.core/releases/latest/download/validator_cli.jar
          sha256sum "${RUNNER_TEMP}/fhir-tools/publisher.jar" "${RUNNER_TEMP}/fhir-tools/validator_cli.jar" \
            > "${RUNNER_TEMP}/tool_sha256.txt"
          {
            echo "python=$(python --version 2>&1)"
            echo "java=$(java -version 2>&1 | head -n 1)"
            echo "node=$(node --version)"
            echo "sushi=$(sushi --version 2>&1 | tail -n 1)"
            echo "publisher=$(java -jar ${RUNNER_TEMP}/fhir-tools/publisher.jar -version 2>&1 | tail -n 1)"
            echo "validator=$(java -jar ${RUNNER_TEMP}/fhir-tools/validator_cli.jar -version 2>&1 | tail -n 1)"
          } > "${RUNNER_TEMP}/tool_versions.txt"

      - name: Run IG Publisher
        run: |
          java -jar "${RUNNER_TEMP}/fhir-tools/publisher.jar" \
            -ig standards/fhir_ig/ig.ini -tx n/a \
            2>&1 | tee "${RUNNER_TEMP}/ig-publisher.log"

      - name: Validate positive and negative FHIR examples
        shell: bash
        run: |
          set -u
          validation="${RUNNER_TEMP}/validation"
          mkdir -p "$validation/positive" "$validation/negative"
          package=standards/fhir_ig/output/package.tgz
          test -f "$package"
          : > "$validation/validator_status.tsv"
          validate_one() {
            local kind="$1"
            local source="$2"
            local stem
            stem="$(basename "$source" .json)"
            local output="$validation/${kind}/${stem}.operationoutcome.json"
            set +e
            java -jar "${RUNNER_TEMP}/fhir-tools/validator_cli.jar" "$source" \
              -version 4.0.1 -ig "$package" -ig ihe.iti.balp#1.1.4 \
              -tx n/a -output "$output" -output-style json
            local status=$?
            set -e
            printf '%s\t%s\t%s\n' "$kind" "$status" "$source" >> "$validation/validator_status.tsv"
          }
          set -e
          for source in standards/fhir_ig/input/resources/*.json; do
            validate_one positive "$source"
          done
          validate_one positive data_examples/hie_disclosure/source/source_clinical_bundle.json
          for source in standards/fhir_ig/negative/*.json; do
            validate_one negative "$source"
          done
          python scripts/summarise_fhir_validation.py \
            --positive-dir "$validation/positive" \
            --negative-dir "$validation/negative" \
            --output "$validation/validator_summary.json"

      - name: Upload FHIR evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: route-c-fhir-validation
          path: |
            ${{ runner.temp }}/semantic_validation.json
            ${{ runner.temp }}/sushi.log
            ${{ runner.temp }}/tool_sha256.txt
            ${{ runner.temp }}/tool_versions.txt
            ${{ runner.temp }}/ig-publisher.log
            ${{ runner.temp }}/validation
            standards/fhir_ig/fsh-generated
            standards/fhir_ig/output
            data_examples/hie_disclosure
          if-no-files-found: warn
          retention-days: 30

  integrity-preview:
    name: Rebuild integrity files
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Rebuild file manifest and checksums
        run: python scripts/rebuild_integrity_files.py

      - name: Record integrity diff
        shell: bash
        run: |
          git diff -- FILE_MANIFEST.tsv SHA256SUMS.txt > route-c-integrity.patch || true

      - name: Upload regenerated integrity files
        uses: actions/upload-artifact@v4
        with:
          name: route-c-integrity-files
          path: |
            FILE_MANIFEST.tsv
            SHA256SUMS.txt
            route-c-integrity.patch
          if-no-files-found: error
          retention-days: 14

  release-check:
    name: Python 3.13 release check
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            environment/requirements-lock-py313-linux.txt

      - name: Install the locked reference environment
        run: |
          python -m pip install --disable-pip-version-check --no-input setuptools==82.0.1 wheel==0.46.3
          python -m pip install --disable-pip-version-check --no-input -r environment/requirements-lock-py313-linux.txt
          python -m pip install --disable-pip-version-check --no-input --no-build-isolation --no-deps -e .

      - name: Record tool versions
        run: |
          python --version
          python -m pip --version
          python -c "import trustevidence; print(trustevidence.__version__)"

      - name: Execute the complete release contract
        shell: bash
        run: |
          set -o pipefail
          make release-check 2>&1 | tee "${RUNNER_TEMP}/route-c-release-check.log"

      - name: Upload the release-check transcript
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: route-c-release-check-log
          path: ${{ runner.temp }}/route-c-release-check.log
          if-no-files-found: error
          retention-days: 30

      - name: Reject unexplained generated drift
        run: git diff --exit-code
