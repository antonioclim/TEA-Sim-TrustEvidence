name: Route C CI

on:
  push:
    branches:
      - main
      - revision/jcis-route-c
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: route-c-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  integrity-sync:
    name: One-time integrity bootstrap
    if: >-
      github.event_name == 'push' &&
      github.ref == 'refs/heads/revision/jcis-route-c' &&
      github.event.head_commit.message == 'ci(route-c): bootstrap integrity sync'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Check out the Route C branch
        uses: actions/checkout@v4
        with:
          ref: revision/jcis-route-c

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Rebuild integrity files
        run: python scripts/rebuild_integrity_files.py

      - name: Commit the regenerated integrity files
        shell: bash
        run: |
          if git diff --quiet -- FILE_MANIFEST.tsv SHA256SUMS.txt; then
            echo 'Integrity files already match the distributed tree.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add FILE_MANIFEST.tsv SHA256SUMS.txt
          git commit -m 'chore(route-c): refresh integrity manifests'
          git push origin HEAD:revision/jcis-route-c

  integrity-preview:
    name: Rebuild integrity files
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Rebuild file manifest and checksums
        run: python scripts/rebuild_integrity_files.py

      - name: Record integrity diff
        shell: bash
        run: |
          git diff -- FILE_MANIFEST.tsv SHA256SUMS.txt > route-c-integrity.patch || true

      - name: Upload regenerated integrity files
        uses: actions/upload-artifact@v4
        with:
          name: route-c-integrity-files
          path: |
            FILE_MANIFEST.tsv
            SHA256SUMS.txt
            route-c-integrity.patch
          if-no-files-found: error
          retention-days: 14

  release-check:
    name: Python 3.13 release check
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            environment/requirements-lock-py313-linux.txt

      - name: Install the locked reference environment
        run: |
          python -m pip install --disable-pip-version-check --no-input setuptools==82.0.1 wheel==0.46.3
          python -m pip install --disable-pip-version-check --no-input -r environment/requirements-lock-py313-linux.txt
          python -m pip install --disable-pip-version-check --no-input --no-build-isolation --no-deps -e .

      - name: Record tool versions
        run: |
          python --version
          python -m pip --version
          python -c "import trustevidence; print(trustevidence.__version__)"

      - name: Execute the complete release contract
        run: make release-check

      - name: Reject unexplained generated drift
        run: git diff --exit-code
