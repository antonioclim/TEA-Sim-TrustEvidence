name: Route C CI

on:
  push:
    branches:
      - main
      - revision/jcis-route-c
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: route-c-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fhir-validation:
    name: HIE case and official FHIR validation
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    steps:
      - name: Check out repository
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4

      - name: Set up Python 3.13
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.13'

      - name: Set up Node 22
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'

      - name: Set up Java 17
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Ruby 3.3
        uses: ruby/setup-ruby@95ef2b042f9d7a56d8268cba8559e2842e2ad01b # v1
        with:
          ruby-version: '3.3'

      - name: Install locked Python and FHIR toolchain
        run: |
          python -m pip install --disable-pip-version-check --no-input setuptools==82.0.1 wheel==0.46.3
          python -m pip install --disable-pip-version-check --no-input -r environment/requirements-lock-py313-linux.txt
          python -m pip install --disable-pip-version-check --no-input --no-build-isolation --no-deps -e .
          npm install --global fsh-sushi@3.20.0
          gem install jekyll -v 4.4.1 --no-document

      - name: Execute official C3 toolchain
        run: bash scripts/run_c3_fhir_validation.sh ephemeral

      - name: Upload FHIR evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: route-c-fhir-validation
          path: |
            ${{ runner.temp }}/route-c-c3-validation
            standards/fhir_ig/fsh-generated
            standards/fhir_ig/output
            standards/fhir_ig/input/resources
            standards/fhir_ig/negative
            data_examples/hie_disclosure
          if-no-files-found: warn
          retention-days: 30

  security-validation:
    name: HIE security and mutation validation
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4

      - name: Set up Python 3.13
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.13'

      - name: Install locked environment
        run: |
          python -m pip install --disable-pip-version-check --no-input setuptools==82.0.1 wheel==0.46.3
          python -m pip install --disable-pip-version-check --no-input -r environment/requirements-lock-py313-linux.txt
          python -m pip install --disable-pip-version-check --no-input --no-build-isolation --no-deps -e .

      - name: Execute retained C4 programme
        run: python experiments/run_hie_security_mutations.py --check

      - name: Upload C4 evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: route-c-c4-security-validation
          path: results_expected/cmpb_reference/c4_hie_security
          if-no-files-found: error
          retention-days: 30

  c5-validation:
    name: C5 paired overhead validation
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4

      - name: Set up Python 3.13
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.13'

      - name: Install locked environment
        run: |
          python -m pip install --disable-pip-version-check --no-input setuptools==82.0.1 wheel==0.46.3
          python -m pip install --disable-pip-version-check --no-input -r environment/requirements-lock-py313-linux.txt
          python -m pip install --disable-pip-version-check --no-input --no-build-isolation --no-deps -e .

      - name: Check retained C5 evidence
        run: python experiments/run_hie_incremental_overhead.py --check

      - name: Upload C5 evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: route-c-c5-overhead-validation
          path: results_expected/cmpb_reference/c5_hie_overhead
          if-no-files-found: error
          retention-days: 30

  integrity-preview:
    name: Rebuild integrity files without drift
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4

      - name: Set up Python 3.13
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.13'

      - name: Rebuild and reject integrity drift
        shell: bash
        run: |
          set -euo pipefail
          python scripts/rebuild_integrity_files.py
          git diff -- FILE_MANIFEST.tsv SHA256SUMS.txt > route-c-integrity.patch || true
          if test -s route-c-integrity.patch; then
            cat route-c-integrity.patch
            exit 1
          fi

      - name: Upload integrity evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: route-c-integrity-files
          path: |
            FILE_MANIFEST.tsv
            SHA256SUMS.txt
            route-c-integrity.patch
          if-no-files-found: error
          retention-days: 14

  release-check:
    name: Python 3.13 release check
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - name: Check out repository
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4

      - name: Set up Python 3.13
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.13'
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            environment/requirements-lock-py313-linux.txt

      - name: Install locked reference environment
        run: |
          python -m pip install --disable-pip-version-check --no-input setuptools==82.0.1 wheel==0.46.3
          python -m pip install --disable-pip-version-check --no-input -r environment/requirements-lock-py313-linux.txt
          python -m pip install --disable-pip-version-check --no-input --no-build-isolation --no-deps -e .

      - name: Record tool versions
        run: |
          python --version
          python -m pip --version
          python -c "import trustevidence; print(trustevidence.__version__)"

      - name: Execute complete release contract
        shell: bash
        run: |
          set -o pipefail
          make release-check 2>&1 | tee "${RUNNER_TEMP}/route-c-release-check.log"

      - name: Upload release-check transcript
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: route-c-release-check-log
          path: ${{ runner.temp }}/route-c-release-check.log
          if-no-files-found: error
          retention-days: 30

      - name: Reject unexplained generated drift
        run: git diff --exit-code

  release-candidate:
    name: C6 deterministic archive and fresh extraction
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    steps:
      - name: Check out repository
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4

      - name: Set up Python 3.13
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.13'
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            environment/requirements-lock-py313-linux.txt

      - name: Install locked candidate environment
        run: |
          python -m pip install --disable-pip-version-check --no-input setuptools==82.0.1 wheel==0.46.3
          python -m pip install --disable-pip-version-check --no-input -r environment/requirements-lock-py313-linux.txt
          python -m pip install --disable-pip-version-check --no-input --no-build-isolation --no-deps -e .

      - name: Execute pre-archive release contract
        shell: bash
        run: |
          set -o pipefail
          make release-check 2>&1 | tee "${RUNNER_TEMP}/c6-pre-archive-release-check.log"

      - name: Audit public distribution and build candidate twice
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "${RUNNER_TEMP}/candidate-a" "${RUNNER_TEMP}/candidate-b" "${RUNNER_TEMP}/reports"
          python scripts/audit_public_distribution.py \
            --report "${RUNNER_TEMP}/reports/public-distribution-audit.json"
          python scripts/build_release_archives.py --output-dir "${RUNNER_TEMP}/candidate-a"
          python scripts/build_release_archives.py --output-dir "${RUNNER_TEMP}/candidate-b"
          cmp "${RUNNER_TEMP}/candidate-a/TEA-Sim-TrustEvidence-v2.2.0-rc.1.zip" \
              "${RUNNER_TEMP}/candidate-b/TEA-Sim-TrustEvidence-v2.2.0-rc.1.zip"
          cmp "${RUNNER_TEMP}/candidate-a/TEA-Sim-TrustEvidence-v2.2.0-rc.1.sha256" \
              "${RUNNER_TEMP}/candidate-b/TEA-Sim-TrustEvidence-v2.2.0-rc.1.sha256"
          echo 'C6-DETERMINISTIC-ARCHIVE: PASS'

      - name: Validate and extract candidate archive
        shell: bash
        run: |
          set -euo pipefail
          python scripts/check_release_archive.py \
            --archive "${RUNNER_TEMP}/candidate-a/TEA-Sim-TrustEvidence-v2.2.0-rc.1.zip" \
            --checksum "${RUNNER_TEMP}/candidate-a/TEA-Sim-TrustEvidence-v2.2.0-rc.1.sha256" \
            --extract-dir "${RUNNER_TEMP}/fresh-extraction" \
            --report "${RUNNER_TEMP}/reports/release-archive-audit.json"

      - name: Execute complete contract from fresh extraction
        shell: bash
        run: |
          set -euo pipefail
          python -m venv "${RUNNER_TEMP}/fresh-venv"
          . "${RUNNER_TEMP}/fresh-venv/bin/activate"
          cd "${RUNNER_TEMP}/fresh-extraction/TEA-Sim-TrustEvidence-v2.2.0-rc.1"
          python -m pip install --disable-pip-version-check --no-input setuptools==82.0.1 wheel==0.46.3
          python -m pip install --disable-pip-version-check --no-input -r environment/requirements-lock-py313-linux.txt
          python -m pip install --disable-pip-version-check --no-input --no-build-isolation --no-deps -e .
          set -o pipefail
          make release-check 2>&1 | tee "${RUNNER_TEMP}/c6-fresh-extraction-release-check.log"

      - name: Reject source-tree drift
        run: git diff --exit-code

      - name: Upload C6 release-candidate package
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: route-c-v2.2.0-rc.1
          path: |
            ${{ runner.temp }}/candidate-a/TEA-Sim-TrustEvidence-v2.2.0-rc.1.zip
            ${{ runner.temp }}/candidate-a/TEA-Sim-TrustEvidence-v2.2.0-rc.1.sha256
            ${{ runner.temp }}/reports/public-distribution-audit.json
            ${{ runner.temp }}/reports/release-archive-audit.json
            ${{ runner.temp }}/c6-pre-archive-release-check.log
            ${{ runner.temp }}/c6-fresh-extraction-release-check.log
          if-no-files-found: error
          retention-days: 30
