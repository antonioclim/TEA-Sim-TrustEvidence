name: Route C CI

on:
  push:
    branches:
      - main
      - revision/jcis-route-c
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: route-c-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  integrity-preview:
    name: Rebuild integrity files
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Rebuild file manifest and checksums
        run: python scripts/rebuild_integrity_files.py

      - name: Record integrity diff
        shell: bash
        run: |
          git diff -- FILE_MANIFEST.tsv SHA256SUMS.txt > route-c-integrity.patch || true

      - name: Upload regenerated integrity files
        uses: actions/upload-artifact@v4
        with:
          name: route-c-integrity-files
          path: |
            FILE_MANIFEST.tsv
            SHA256SUMS.txt
            route-c-integrity.patch
          if-no-files-found: error
          retention-days: 14

  release-check:
    name: Python 3.13 release check
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            environment/requirements-lock-py313-linux.txt

      - name: Install the locked reference environment
        run: |
          python -m pip install --disable-pip-version-check --no-input setuptools==82.0.1 wheel==0.46.3
          python -m pip install --disable-pip-version-check --no-input -r environment/requirements-lock-py313-linux.txt
          python -m pip install --disable-pip-version-check --no-input --no-build-isolation --no-deps -e .

      - name: Record tool versions
        run: |
          python --version
          python -m pip --version
          python -c "import trustevidence; print(trustevidence.__version__)"

      - name: Execute the complete release contract
        run: make release-check

      - name: Reject unexplained generated drift
        run: git diff --exit-code
