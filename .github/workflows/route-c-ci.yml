name: Route C CI

on:
  push:
    branches:
      - main
      - revision/jcis-route-c
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: route-c-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  integrity-sync:
    name: One-time integrity bootstrap
    if: >-
      github.event_name == 'push' &&
      github.ref == 'refs/heads/revision/jcis-route-c' &&
      github.event.head_commit.message == 'ci(route-c): bootstrap integrity sync'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Check out the Route C branch
        uses: actions/checkout@v4
        with:
          ref: revision/jcis-route-c

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Rebuild integrity files
        run: python scripts/rebuild_integrity_files.py

      - name: Commit the regenerated integrity files
        shell: bash
        run: |
          if git diff --quiet -- FILE_MANIFEST.tsv SHA256SUMS.txt; then
            echo 'Integrity files already match the distributed tree.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add FILE_MANIFEST.tsv SHA256SUMS.txt
          git commit -m 'chore(route-c): refresh integrity manifests'
          git push origin HEAD:revision/jcis-route-c

  c3-materialise:
    name: Materialise validated C3 evidence
    if: >-
      github.event_name == 'pull_request' ||
      (github.event_name == 'push' &&
       github.ref == 'refs/heads/revision/jcis-route-c' &&
       github.event.head_commit.message == 'ci(route-c): materialise C3 evidence')
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    permissions:
      contents: write
    steps:
      - name: Check out the Route C branch
        uses: actions/checkout@v4
        with:
          ref: revision/jcis-route-c

      - name: Determine whether C3 materialisation is required
        id: materialise
        shell: bash
        run: |
          if test -f docs/route_c/C3_MATERIALISATION_TRIGGER.md && \
             ! test -f standards/fhir_ig/validation/validator_summary.json; then
            echo 'run=true' >> "$GITHUB_OUTPUT"
            echo 'C3 evidence is not yet retained; materialisation is required.'
          else
            echo 'run=false' >> "$GITHUB_OUTPUT"
            echo 'C3 evidence is already retained or the trigger marker is absent.'
          fi

      - name: Set up Python 3.13
        if: steps.materialise.outputs.run == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Set up Node 22
        if: steps.materialise.outputs.run == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Set up Java 17
        if: steps.materialise.outputs.run == 'true'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Ruby 3.3
        if: steps.materialise.outputs.run == 'true'
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'

      - name: Install the locked environment
        if: steps.materialise.outputs.run == 'true'
        run: |
          python -m pip install --disable-pip-version-check --no-input setuptools==82.0.1 wheel==0.46.3
          python -m pip install --disable-pip-version-check --no-input -r environment/requirements-lock-py313-linux.txt
          python -m pip install --disable-pip-version-check --no-input --no-build-isolation --no-deps -e .
          npm install --global fsh-sushi@3.20.0
          gem install jekyll -v 4.4.1 --no-document

      - name: Execute and retain the official C3 toolchain
        if: steps.materialise.outputs.run == 'true'
        run: |
          bash scripts/run_c3_fhir_validation.sh retain
          bash scripts/prepare_c3_retained_evidence.sh

      - name: Commit validated evidence and integrity manifests
        if: steps.materialise.outputs.run == 'true'
        shell: bash
        run: |
          python scripts/rebuild_integrity_files.py
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add data_examples/hie_disclosure
          git add standards/fhir_ig/input/resources
          git add standards/fhir_ig/negative
          git add standards/fhir_ig/fsh-generated
          git add standards/fhir_ig/validation
          git add FILE_MANIFEST.tsv SHA256SUMS.txt
          if git diff --cached --quiet; then
            echo 'The materialisation run produced no retained C3 evidence changes.'
            exit 1
          fi
          git commit -m 'chore(route-c): materialise validated C3 evidence'
          git push origin HEAD:revision/jcis-route-c

      - name: Upload retained C3 evidence
        if: always() && steps.materialise.outputs.run == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: route-c-c3-materialisation
          path: |
            data_examples/hie_disclosure
            standards/fhir_ig/input/resources
            standards/fhir_ig/negative
            standards/fhir_ig/fsh-generated
            standards/fhir_ig/validation
            standards/fhir_ig/output
          if-no-files-found: warn
          retention-days: 30

  c4-materialise:
    name: Materialise C4 security evidence
    if: >-
      github.event_name == 'push' &&
      github.ref == 'refs/heads/revision/jcis-route-c' &&
      github.event.head_commit.message == 'ci(route-c): materialise C4 evidence'
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      contents: write
    steps:
      - name: Check out the Route C branch
        uses: actions/checkout@v4
        with:
          ref: revision/jcis-route-c

      - name: Determine whether C4 materialisation is required
        id: materialise
        shell: bash
        run: |
          if test -f docs/route_c/C4_MATERIALISATION_TRIGGER.md && \
             ! test -f results_expected/cmpb_reference/c4_hie_security/hie_security_mutation_run.json; then
            echo 'run=true' >> "$GITHUB_OUTPUT"
            echo 'C4 evidence is not yet retained; materialisation is required.'
          else
            echo 'run=false' >> "$GITHUB_OUTPUT"
            echo 'C4 evidence is already retained or the trigger marker is absent.'
          fi

      - name: Set up Python 3.13
        if: steps.materialise.outputs.run == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install the locked environment
        if: steps.materialise.outputs.run == 'true'
        run: |
          python -m pip install --disable-pip-version-check --no-input setuptools==82.0.1 wheel==0.46.3
          python -m pip install --disable-pip-version-check --no-input -r environment/requirements-lock-py313-linux.txt
          python -m pip install --disable-pip-version-check --no-input --no-build-isolation --no-deps -e .

      - name: Execute and retain the C4 security programme
        if: steps.materialise.outputs.run == 'true'
        run: |
          python experiments/run_hie_security_mutations.py \
            --output-dir results_expected/cmpb_reference/c4_hie_security
          python scripts/make_reproducibility_manifest.py

      - name: Commit validated C4 evidence and integrity manifests
        if: steps.materialise.outputs.run == 'true'
        shell: bash
        run: |
          python scripts/rebuild_integrity_files.py
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add results_expected/cmpb_reference/c4_hie_security
          git add results_expected/cmpb_reference/reproducibility_manifest.csv
          git add FILE_MANIFEST.tsv SHA256SUMS.txt
          if git diff --cached --quiet; then
            echo 'The materialisation run produced no retained C4 evidence changes.'
            exit 1
          fi
          git commit -m 'chore(route-c): materialise C4 security evidence'
          git push origin HEAD:revision/jcis-route-c

      - name: Upload retained C4 evidence
        if: always() && steps.materialise.outputs.run == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: route-c-c4-security-materialisation
          path: results_expected/cmpb_reference/c4_hie_security
          if-no-files-found: error
          retention-days: 30

  fhir-validation:
    name: HIE case and official FHIR validation
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Ruby 3.3
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'

      - name: Install the locked environment
        run: |
          python -m pip install --disable-pip-version-check --no-input setuptools==82.0.1 wheel==0.46.3
          python -m pip install --disable-pip-version-check --no-input -r environment/requirements-lock-py313-linux.txt
          python -m pip install --disable-pip-version-check --no-input --no-build-isolation --no-deps -e .
          npm install --global fsh-sushi@3.20.0
          gem install jekyll -v 4.4.1 --no-document

      - name: Execute the official C3 toolchain
        run: bash scripts/run_c3_fhir_validation.sh ephemeral

      - name: Upload FHIR evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: route-c-fhir-validation
          path: |
            ${{ runner.temp }}/route-c-c3-validation
            standards/fhir_ig/fsh-generated
            standards/fhir_ig/output
            standards/fhir_ig/input/resources
            standards/fhir_ig/negative
            data_examples/hie_disclosure
          if-no-files-found: warn
          retention-days: 30

  security-validation:
    name: HIE security and mutation validation
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install the locked environment
        run: |
          python -m pip install --disable-pip-version-check --no-input setuptools==82.0.1 wheel==0.46.3
          python -m pip install --disable-pip-version-check --no-input -r environment/requirements-lock-py313-linux.txt
          python -m pip install --disable-pip-version-check --no-input --no-build-isolation --no-deps -e .

      - name: Execute the retained C4 security programme
        run: python experiments/run_hie_security_mutations.py --check

      - name: Upload C4 security evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: route-c-c4-security-validation
          path: results_expected/cmpb_reference/c4_hie_security
          if-no-files-found: warn
          retention-days: 30

  integrity-preview:
    name: Rebuild integrity files
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Rebuild file manifest and checksums
        run: python scripts/rebuild_integrity_files.py

      - name: Record integrity diff
        shell: bash
        run: |
          git diff -- FILE_MANIFEST.tsv SHA256SUMS.txt > route-c-integrity.patch || true

      - name: Upload regenerated integrity files
        uses: actions/upload-artifact@v4
        with:
          name: route-c-integrity-files
          path: |
            FILE_MANIFEST.tsv
            SHA256SUMS.txt
            route-c-integrity.patch
          if-no-files-found: error
          retention-days: 14

  release-check:
    name: Python 3.13 release check
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            environment/requirements-lock-py313-linux.txt

      - name: Install the locked reference environment
        run: |
          python -m pip install --disable-pip-version-check --no-input setuptools==82.0.1 wheel==0.46.3
          python -m pip install --disable-pip-version-check --no-input -r environment/requirements-lock-py313-linux.txt
          python -m pip install --disable-pip-version-check --no-input --no-build-isolation --no-deps -e .

      - name: Record tool versions
        run: |
          python --version
          python -m pip --version
          python -c "import trustevidence; print(trustevidence.__version__)"

      - name: Execute the complete release contract
        shell: bash
        run: |
          set -o pipefail
          make release-check 2>&1 | tee "${RUNNER_TEMP}/route-c-release-check.log"

      - name: Upload the release-check transcript
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: route-c-release-check-log
          path: ${{ runner.temp }}/route-c-release-check.log
          if-no-files-found: error
          retention-days: 30

      - name: Reject unexplained generated drift
        run: git diff --exit-code
