name: Route C C4 Materialisation

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: route-c-c4-materialise-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  materialise:
    name: Materialise deterministic C4 evidence
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Check out the Route C branch
        uses: actions/checkout@v4
        with:
          ref: revision/jcis-route-c

      - name: Determine whether materialisation is required
        id: decision
        shell: bash
        run: |
          if test -f docs/route_c/C4_MATERIALISATION_TRIGGER.md && \
             ! test -f results_expected/cmpb_reference/c4_hie_security/hie_security_mutation_run.json; then
            echo 'run=true' >> "$GITHUB_OUTPUT"
          else
            echo 'run=false' >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Python 3.13
        if: steps.decision.outputs.run == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install the locked environment
        if: steps.decision.outputs.run == 'true'
        run: |
          python -m pip install --disable-pip-version-check --no-input setuptools==82.0.1 wheel==0.46.3
          python -m pip install --disable-pip-version-check --no-input -r environment/requirements-lock-py313-linux.txt
          python -m pip install --disable-pip-version-check --no-input --no-build-isolation --no-deps -e .

      - name: Apply the documented protocol amendment
        if: steps.decision.outputs.run == 'true'
        run: python scripts/apply_c4_protocol_amendment.py

      - name: Execute and retain C4 evidence
        if: steps.decision.outputs.run == 'true'
        run: |
          python experiments/run_hie_security_mutations.py \
            --output-dir results_expected/cmpb_reference/c4_hie_security
          python scripts/make_reproducibility_manifest.py
          python scripts/rebuild_integrity_files.py

      - name: Commit retained evidence and the amended registry
        if: steps.decision.outputs.run == 'true'
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add experiments/run_hie_security_mutations.py
          git add results_expected/cmpb_reference/c4_hie_security
          git add results_expected/cmpb_reference/reproducibility_manifest.csv
          git add FILE_MANIFEST.tsv SHA256SUMS.txt
          if git diff --cached --quiet; then
            echo 'No C4 evidence or protocol-registry changes were generated.'
            exit 1
          fi
          git commit -m 'chore(route-c): materialise amended C4 security evidence'
          git push origin HEAD:revision/jcis-route-c

      - name: Upload C4 evidence
        if: always() && steps.decision.outputs.run == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: route-c-c4-security-materialisation
          path: results_expected/cmpb_reference/c4_hie_security
          if-no-files-found: error
          retention-days: 30
