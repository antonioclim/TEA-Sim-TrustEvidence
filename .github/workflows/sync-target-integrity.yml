name: Sync Route C target integrity files

on:
  push:
    branches:
      - revision/jcis-route-c-ci
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-24.04
    steps:
      - name: Check out target Route C branch
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262
        with:
          ref: revision/jcis-route-c
          fetch-depth: 0
      - name: Set up Python 3.13
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.13'
      - name: Rebuild target integrity files
        run: python scripts/rebuild_integrity_files.py
      - name: Commit target integrity files
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add FILE_MANIFEST.tsv SHA256SUMS.txt
          if git diff --cached --quiet; then
            echo 'Target integrity files are already current.'
          else
            git commit -m 'release: synchronise final v2.2.0 integrity files'
            git push origin HEAD:revision/jcis-route-c
          fi

# Trigger final target-branch integrity synchronisation.
