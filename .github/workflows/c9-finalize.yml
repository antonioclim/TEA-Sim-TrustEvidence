name: C9 Finalise v2.2.0 metadata

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

permissions:
  contents: write
  pull-requests: read

jobs:
  finalise:
    runs-on: ubuntu-24.04
    if: github.event_name == 'workflow_dispatch' || github.head_ref == 'revision/jcis-route-c'
    steps:
      - name: Check out Route C branch
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262
        with:
          ref: revision/jcis-route-c
          fetch-depth: 0
      - name: Set up Python 3.13
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.13'
      - name: Apply final v2.2.0 metadata and rebuild integrity catalogues
        run: |
          python scripts/finalize_v220_metadata.py
          python scripts/rebuild_integrity_files.py
          python scripts/check_public_metadata.py
          python scripts/repository_check.py
          python scripts/check_action_pins.py
      - name: Commit final metadata
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          if git diff --cached --quiet; then
            echo 'No finalisation changes to commit.'
          else
            git commit -m 'release: finalise TEA-Sim TrustEvidence v2.2.0 metadata'
            git push origin HEAD:revision/jcis-route-c
          fi

# One-time workflow for the DOI-bound finalisation commit.
