name: C9 Finalise v2.2.0 metadata

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

permissions:
  contents: write
  pull-requests: read

jobs:
  finalise:
    runs-on: ubuntu-24.04
    if: github.event_name == 'workflow_dispatch' || github.head_ref == 'revision/jcis-route-c'
    steps:
      - name: Check out Route C branch
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262
        with:
          ref: revision/jcis-route-c
          fetch-depth: 0
      - name: Set up Python 3.13
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.13'
      - name: Prepare one-time finaliser
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('scripts/finalize_v220_metadata.py')
          text = path.read_text(encoding='utf-8')
          marker = '# Remove any AI-tool strings from public tree (none expected).'
          if marker in text:
              start = text.index(marker)
              end = text.index("print('FINALISE-TREE: PASS')", start)
              path.write_text(text[:start] + text[end:], encoding='utf-8', newline='\n')
          PY
      - name: Apply final v2.2.0 metadata
        id: apply
        continue-on-error: true
        run: |
          set -o pipefail
          python scripts/finalize_v220_metadata.py 2>&1 | tee /tmp/c9-finaliser.log
      - name: Rebuild integrity catalogues
        id: integrity
        if: steps.apply.outcome == 'success'
        continue-on-error: true
        run: |
          set -o pipefail
          python scripts/rebuild_integrity_files.py 2>&1 | tee /tmp/c9-integrity.log
      - name: Upload C9 diagnostic logs
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: c9-finalisation-diagnostics
          path: |
            /tmp/c9-finaliser.log
            /tmp/c9-integrity.log
          if-no-files-found: warn
      - name: Stop if finalisation failed
        if: steps.apply.outcome != 'success' || steps.integrity.outcome != 'success'
        run: exit 1
      - name: Commit final metadata
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          if git diff --cached --quiet; then
            echo 'No finalisation changes to commit.'
          else
            git commit -m 'release: finalise TEA-Sim TrustEvidence v2.2.0 metadata'
            git push origin HEAD:revision/jcis-route-c
          fi

# One-time workflow for the DOI-bound finalisation commit.
