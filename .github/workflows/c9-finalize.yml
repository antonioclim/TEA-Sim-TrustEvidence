name: C9 Clean final v2.2.0 release tree

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

permissions:
  contents: write
  pull-requests: read

jobs:
  clean-final-tree:
    runs-on: ubuntu-24.04
    if: github.event_name == 'workflow_dispatch' || github.head_ref == 'revision/jcis-route-c'
    steps:
      - name: Check out Route C branch
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262
        with:
          ref: revision/jcis-route-c
          fetch-depth: 0
      - name: Replace release-candidate workflow paths and remove one-time machinery
        run: |
          python - <<'PY'
          from pathlib import Path
          root = Path('.')
          path = root / '.github/workflows/route-c-ci.yml'
          text = path.read_text(encoding='utf-8')
          replacements = {
              'Audit public distribution and build candidate twice': 'Audit public distribution and build release twice',
              '${RUNNER_TEMP}/candidate-a': '${RUNNER_TEMP}/release-a',
              '${RUNNER_TEMP}/candidate-b': '${RUNNER_TEMP}/release-b',
              'Validate and extract candidate archive': 'Validate and extract release archive',
              'TEA-Sim-TrustEvidence-v2.2.0-rc.1.zip': 'TEA-Sim-TrustEvidence-v2.2.0.zip',
              'TEA-Sim-TrustEvidence-v2.2.0-rc.1.sha256': 'TEA-Sim-TrustEvidence-v2.2.0.sha256',
              'TEA-Sim-TrustEvidence-v2.2.0-rc.1': 'TEA-Sim-TrustEvidence-v2.2.0',
              'Upload C6 release-candidate package': 'Upload v2.2.0 release package',
              'route-c-v2.2.0-rc.1': 'teasim-trustevidence-v2.2.0',
              'c6-pre-archive-release-check.log': 'v2.2.0-pre-archive-release-check.log',
              'c6-fresh-extraction-release-check.log': 'v2.2.0-fresh-extraction-release-check.log',
          }
          for old, new in replacements.items():
              text = text.replace(old, new)
          path.write_text(text, encoding='utf-8', newline='\n')
          for rel in ['scripts/finalize_v220_metadata.py', '.github/workflows/c9-finalize.yml']:
              target = root / rel
              if target.exists():
                  target.unlink()
          PY
          python scripts/rebuild_integrity_files.py
      - name: Commit clean final release tree
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'release: clean final TEA-Sim TrustEvidence v2.2.0 tree'
          git push origin HEAD:revision/jcis-route-c
