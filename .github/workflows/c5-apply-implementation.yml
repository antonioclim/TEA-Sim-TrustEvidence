name: Route C C5 Apply Implementation

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: route-c-c5-apply-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  cleanup:
    name: Remove staged C5 transfer chunks
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Check out the Route C branch
        uses: actions/checkout@v4
        with:
          ref: revision/jcis-route-c
          fetch-depth: 1

      - name: Remove and commit transfer chunks
        shell: bash
        run: |
          if ! compgen -G 'scripts/c5_implementation_bundle.part0*' > /dev/null; then
            echo 'C5 transfer chunks are already absent.'
            exit 0
          fi
          rm -f scripts/c5_implementation_bundle.part0*
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -u scripts/c5_implementation_bundle.part0*
          git commit -m 'chore(route-c): remove C5 transfer chunks'
          git push origin HEAD:revision/jcis-route-c
